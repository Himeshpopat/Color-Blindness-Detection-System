<!DOCTYPE html>
<html>
<head>
  <title>My Reports</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      margin: 40px 0;
    }

    .stat-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      transition: 0.4s;
    }

    .stat-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .stat-card h2 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .reports-container {
      width: 85%;
      margin: auto;
    }

    .report-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      padding: 25px;
      border-radius: 20px;
      margin-bottom: 25px;
      position: relative;
      transition: 0.4s;
      animation: fadeUp 0.6s ease forwards;
      opacity: 0;
    }

    .report-card:hover {
      transform: scale(1.02);
      box-shadow: 0 25px 60px rgba(0,0,0,0.7);
    }

    .progress {
      height: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4facfe, #6a11cb);
      transition: 1s ease;
    }

    .delete-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: red;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
    }

    .clear-btn {
      margin: 20px;
      padding: 10px 25px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(45deg, #ff512f, #dd2476);
      color: white;
      cursor: pointer;
    }

    .pdf-btn {
      margin-top: 15px;
      padding: 8px 20px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(45deg,#4facfe,#6a11cb);
      color: white;
      cursor: pointer;
    }

    @keyframes fadeUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media(max-width: 900px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<nav>
  <h2>Color Vision Detector</h2>
</nav>

<section class="hero">
  <h1>Reports Analytics</h1>

  <div class="stats-grid">
    <div class="stat-card">
      <h2 id="totalTests">0</h2>
      <p>Total Tests</p>
    </div>

    <div class="stat-card">
      <h2 id="avgScore">0%</h2>
      <p>Average Accuracy</p>
    </div>

    <div class="stat-card">
      <h2 id="lastResult">-</h2>
      <p>Last Result</p>
    </div>
  </div>

  <button class="clear-btn" onclick="clearReports()">Clear All Reports</button>

  <div class="reports-container" id="reportsContainer"></div>

</section>

<div class="bubbles">
  <span></span><span></span><span></span>
  <span></span><span></span><span></span>
</div>

<script>
  let reports = JSON.parse(localStorage.getItem("reports")) || [];
  const container = document.getElementById("reportsContainer");

  function loadReports() {
    container.innerHTML = "";

    if (reports.length === 0) {
      container.innerHTML = "<p>No reports available.</p>";
      document.getElementById("totalTests").innerText = 0;
      document.getElementById("avgScore").innerText = "0%";
      document.getElementById("lastResult").innerText = "-";
      return;
    }

    let totalPercent = 0;

    reports.forEach((report, index) => {
      const percentValue = parseInt(report.percentage);
      totalPercent += percentValue;

      container.innerHTML += `
        <div class="report-card">
          <button class="delete-btn" onclick="deleteReport(${index})">Delete</button>

          <h3>${report.result}</h3>
          <p><strong>Score:</strong> ${report.score}</p>
          <p><strong>Accuracy:</strong> ${report.percentage}</p>
          <p><strong>Date:</strong> ${report.date}</p>

          <div class="progress">
            <div class="progress-bar" style="width:${percentValue}%"></div>
          </div>

          <button class="pdf-btn" onclick="downloadPDF(${index})">
            Download PDF
          </button>
        </div>
      `;
    });

    document.getElementById("totalTests").innerText = reports.length;
    document.getElementById("avgScore").innerText =
      Math.round(totalPercent / reports.length) + "%";
    document.getElementById("lastResult").innerText =
      reports[reports.length - 1].result;
  }

  function deleteReport(index) {
    reports.splice(index, 1);
    localStorage.setItem("reports", JSON.stringify(reports));
    loadReports();
  }

  function clearReports() {
    localStorage.removeItem("reports");
    reports = [];
    loadReports();
  }

function downloadPDF(index) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const report = reports[index];
  const percent = parseInt(report.percentage);

  // ===== Header =====
  doc.setFillColor(30, 30, 60);
  doc.rect(0, 0, 210, 30, "F");

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.text("COLOR VISION TEST REPORT", 105, 18, { align: "center" });

  // Reset text color
  doc.setTextColor(0, 0, 0);

  // ===== Report Info Section =====
  doc.setFontSize(14);
  doc.text("Result:", 20, 50);
  doc.setFontSize(16);
  doc.setTextColor(40, 90, 180);
  doc.text(report.result, 60, 50);

  doc.setTextColor(0, 0, 0);
  doc.setFontSize(14);
  doc.text("Score:", 20, 65);
  doc.text(report.score, 60, 65);

  doc.text("Accuracy:", 20, 80);
  doc.text(report.percentage, 60, 80);

  doc.text("Test Date:", 20, 95);
  doc.text(report.date, 60, 95);

  // ===== Divider Line =====
  doc.setDrawColor(100);
  doc.line(20, 105, 190, 105);

  // ===== Accuracy Bar =====
  doc.setFontSize(14);
  doc.text("Performance Overview", 20, 120);

  // Background bar
  doc.setFillColor(220, 220, 220);
  doc.rect(20, 130, 170, 10, "F");

  // Progress bar
  doc.setFillColor(79, 172, 254);
  doc.rect(20, 130, 1.7 * percent, 10, "F");

  // Percentage label
  doc.setFontSize(12);
  doc.setTextColor(0);
  doc.text(percent + "%", 100, 150, { align: "center" });

  // ===== Result Badge Box =====
  doc.setFillColor(240, 240, 255);
  doc.roundedRect(40, 165, 130, 20, 5, 5, "F");

  doc.setFontSize(14);
  doc.setTextColor(50, 50, 150);
  doc.text("Final Assessment: " + report.result, 105, 178, { align: "center" });

  // ===== Footer =====
  doc.setTextColor(120);
  doc.setFontSize(10);
  doc.text("Generated by Color Vision Detector Web Application", 105, 285, { align: "center" });

  // Save with dynamic filename
  doc.save("CVD_Report_" + new Date().getTime() + ".pdf");
}

  loadReports();
</script>

</body>
</html>
