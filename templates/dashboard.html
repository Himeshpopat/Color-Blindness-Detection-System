<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .dashboard-title {
            margin-bottom: 20px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin-top: 50px;
        }

        .card {
            padding: 60px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            cursor: pointer;
            font-size: 22px;
            font-weight: bold;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
            animation: cardEntry 1s ease forwards;
            opacity: 0;
            transform-style: preserve-3d;
            text-align: center;
        }

        @keyframes cardEntry {
            from {
                transform: translateY(60px) rotateX(20deg);
                opacity: 0;
            }

            to {
                transform: translateY(0) rotateX(0deg);
                opacity: 1;
            }
        }

        .card:hover {
            transform: translateY(-12px) scale(1.07) rotateX(5deg);
            box-shadow: 0 35px 80px rgba(0, 0, 0, 0.7);
        }

        .card::before {
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 30px;
            background: linear-gradient(45deg,
                    #00f2fe,
                    #4facfe,
                    #6a11cb,
                    #00f2fe);
            background-size: 300% 300%;
            animation: borderMove 6s linear infinite;
            z-index: -1;
            filter: blur(25px);
            opacity: 0;
            transition: 0.5s;
        }

        .card:hover::before {
            opacity: 1;
        }

        @keyframes borderMove {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        .card::after {
            content: "";
            position: absolute;
            top: 0;
            left: -120%;
            width: 120%;
            height: 100%;
            background: linear-gradient(120deg,
                    transparent,
                    rgba(255, 255, 255, 0.3),
                    transparent);
            transition: 0.8s;
        }

        .card:hover::after {
            left: 120%;
        }

        .icon {
            font-size: 55px;
            margin-bottom: 25px;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0);
            }
        }

        @media(max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <nav class="main-nav">
        <div class="logo">Color Vision Detector</div>

        <div class="nav-links">
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('test') }}">Test</a>
            <a href="{{ url_for('mosaic') }}">Mosaic Test</a>
            <a href="{{ url_for('reports') }}">Reports</a>
            <a href="{{ url_for('simulation') }}">Simulation</a>
            <a href="{{ url_for('about') }}">About</a>
            <button onclick="toggleBW()" class="mode-btn">B/W Mode</button>
            <a href="{{ url_for('index') }}">Logout</a>
        </div>
    </nav>

    <section class="hero">
        <h1 class="dashboard-title">Dashboard</h1>

        <div class="dashboard-grid">

            <div class="card" onclick="goTest()">
                <div class="icon">🧪</div>
                Ishihara Test
            </div>

            <div class="card" onclick="goMosaic()">
                <div class="icon">🧩</div>
                Mosaic Test
            </div>

            <div class="card" onclick="goReports()">
                <div class="icon">📊</div>
                My Reports
            </div>

            <div class="card" onclick="goSimulation()">
                <div class="icon">🎨</div>
                Simulation
            </div>

        </div>
    </section>

    <div class="bubbles">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
    </div>

    <footer class="footer">
        © 2026 Color Vision Detector | Academic Project
    </footer>

    <script>
        function goTest() {
            window.location.href = "{{ url_for('test') }}";
        }

        function goMosaic() {
            window.location.href = "{{ url_for('mosaic') }}";
        }

        function goReports() {
            window.location.href = "{{ url_for('reports') }}";
        }

        function goSimulation() {
            window.location.href = "{{ url_for('simulation') }}";
        }

        function toggleBW() {
            document.body.classList.toggle("bw-mode");

            if (document.body.classList.contains("bw-mode")) {
                localStorage.setItem("mode", "bw");
            } else {
                localStorage.setItem("mode", "color");
            }
        }

        if (localStorage.getItem("mode") === "bw") {
            document.body.classList.add("bw-mode");
        }
    </script>
</body>

</html>
