<!DOCTYPE html>
<html>

<head>
  <title>Ishihara Test</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="main-nav">
    <div class="logo">Color Vision Detector</div>

    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="test.html">Test</a>
      <a href="reports.html">Reports</a>
      <a href="simulation.html">Simulation</a>
      <button onclick="toggleBW()" class="mode-btn">B/W Mode</button>
      <a href="index.html">Logout</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Ishihara Test</h1>
    <p id="questionCount">Question 1 of 10</p>

    <div class="progress-container">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <div class="test-content">

      <img id="plateImage" src="images/test1.png" width="300" alt="Ishihara Plate">

      <input type="text" id="answerInput" placeholder="Enter number you see">

      <button onclick="nextQuestion()">Next</button>

    </div>
  </section>

  <div class="bubbles">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <script src="script.js"></script>
  <footer class="footer">
    © 2026 Color Vision Detector | Academic Project
  </footer>
  <script>
    function toggleBW() {
      document.body.classList.toggle("bw-mode");

      if (document.body.classList.contains("bw-mode")) {
        localStorage.setItem("mode", "bw");
      } else {
        localStorage.setItem("mode", "color");
      }
    }

    if (localStorage.getItem("mode") === "bw") {
      document.body.classList.add("bw-mode");
    }
  </script>
</body>

</html>
